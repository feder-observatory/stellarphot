channels:
    - conda-forge
    - defaults
dependencies:
    - python>=3.12
    - pip
    - astropy >=5
    - astroquery
    - ccdproc
    - ipywidgets
    - bottleneck
    - photutils >=1
    - matplotlib
    - pandas
    - gatspy
    - pyyaml
    - pydantic>=2
    - reducer
    - reproject
    - sphinx
    - sphinx-astropy
    - pip:
        - ipyautoui
        # conda-forge has neither astrowidgets >=0.5.1 nor
        # astro-image-display-api, so these come from PyPI.
        - astrowidgets >=0.5.1
        - astro-image-display-api >=0.2.1
